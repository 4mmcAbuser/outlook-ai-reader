<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Αποτροπή caching της ίδιας της HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>AI Executive Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090b', foreground: '#fafafa',
                        card: '#18181b', cardForeground: '#fafafa',
                        popover: '#18181b', popoverForeground: '#fafafa',
                        primary: '#fafafa', primaryForeground: '#18181b',
                        secondary: '#27272a', secondaryForeground: '#fafafa',
                        muted: '#27272a', mutedForeground: '#a1a1aa',
                        accent: '#27272a', accentForeground: '#fafafa',
                        destructive: '#7f1d1d', destructiveForeground: '#fafafa',
                        border: '#27272a', input: '#27272a', ring: '#d4d4d8',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body { background-color: #09090b; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; overflow-x: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Siri Bubble Animation */
        .siri-idle { background: radial-gradient(circle at 50% 50%, #27272a, #18181b); box-shadow: 0 0 15px rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .siri-idle:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.1); }
        .siri-listening { 
            background: linear-gradient(45deg, #ff0080, #7928ca, #00bfff, #00ff80); 
            background-size: 400% 400%;
            animation: gradient-shift 3s ease infinite, pulse-glow 1.5s infinite alternate;
        }
        @keyframes gradient-shift { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        @keyframes pulse-glow { 0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(0,191,255,0.4); } 100% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,0,128,0.7); } }

        /* View Transitions */
        .view-section { display: none; opacity: 0; transition: opacity 0.3s ease-in-out; height: 100vh; overflow-y: auto; padding-bottom: 20px;}
        .view-active { display: flex; opacity: 1; flex-direction: column; }
    </style>
</head>
<body class="antialiased">

    <div id="view-main" class="view-section view-active p-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-sm font-semibold text-primary flex items-center gap-2">
                <i data-lucide="bot" class="w-5 h-5 text-blue-400"></i> AI Assistant
            </h1>
            <button onclick="navigate('view-settings')" class="p-2 rounded-md hover:bg-secondary transition-colors text-mutedForeground hover:text-primary">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
        </header>

        <div class="bg-card border border-border rounded-xl p-4 mb-5 shadow-sm relative overflow-hidden group">
            <h2 class="text-xs font-bold uppercase tracking-wider text-mutedForeground mb-2 flex items-center gap-1">
                <i data-lucide="file-text" class="w-3 h-3"></i> Σύνοψη
            </h2>
            <div id="summaryContent" class="text-sm text-primary leading-relaxed max-h-24 overflow-hidden transition-all duration-300 relative">
                <div id="loadingOverlay" class="absolute inset-0 bg-card z-10 flex items-center gap-2">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin text-blue-400"></i>
                    <span id="loadingText" class="text-sm text-mutedForeground">Διαβάζω το email...</span>
                </div>
                <div id="summaryText">Περιμένω ανάλυση...</div>
                <div id="summaryFade" class="absolute bottom-0 left-0 right-0 h-8 bg-gradient-to-t from-card to-transparent hidden"></div>
            </div>
            <button id="expandSummaryBtn" class="hidden mt-2 text-xs text-blue-400 hover:text-blue-300 font-medium">Περισσότερα...</button>
            <button id="manualSummaryBtn" class="hidden w-full mt-2 bg-secondary text-primary py-2 rounded-md text-xs font-medium hover:bg-border transition-colors">
                <i data-lucide="sparkles" class="w-3 h-3 inline mr-1"></i> Δημιουργία Σύνοψης
            </button>
        </div>

        <div class="mb-5">
            <h2 class="text-xs font-bold uppercase tracking-wider text-mutedForeground mb-2">Άμεσες Ενέργειες</h2>
            <div class="flex overflow-x-auto gap-2 pb-2 scrollbar-hide">
                <button onclick="handleQuickAction('Γράψε μια απάντηση όπου θα ευχαριστείς θερμά')" class="flex-shrink-0 bg-secondary hover:bg-border border border-border text-xs py-1.5 px-3 rounded-full transition-colors flex items-center gap-1">👍 Ευχαριστώ</button>
                <button onclick="handleQuickAction('Γράψε μια απάντηση ότι αποδεχόμαστε')" class="flex-shrink-0 bg-secondary hover:bg-border border border-border text-xs py-1.5 px-3 rounded-full transition-colors flex items-center gap-1">✅ Αποδοχή</button>
                <button onclick="handleQuickAction('Γράψε μια ευγενική αρνητική απάντηση απόρριψης')" class="flex-shrink-0 bg-secondary hover:bg-border border border-border text-xs py-1.5 px-3 rounded-full transition-colors flex items-center gap-1">❌ Απόρριψη</button>
                <button onclick="handleQuickAction('Γράψε ότι θα το σκεφτούμε και θα επανέλθουμε')" class="flex-shrink-0 bg-secondary hover:bg-border border border-border text-xs py-1.5 px-3 rounded-full transition-colors flex items-center gap-1">⏳ Θα επανέλθω</button>
            </div>
        </div>

        <div class="flex-grow flex flex-col items-center justify-center mt-2 mb-6">
            <button id="voiceBtn" class="w-24 h-24 rounded-full siri-idle flex items-center justify-center text-primary cursor-pointer border border-border focus:outline-none">
                <i data-lucide="mic" class="w-8 h-8 opacity-70"></i>
            </button>
            <span id="voiceStatus" class="text-xs text-mutedForeground mt-4 text-center">Κάντε κλικ για ομιλία</span>
        </div>

        <div class="mt-auto relative">
            <input type="text" id="textPrompt" placeholder="Ή γράψτε μια οδηγία / ερώτηση..." class="w-full bg-card border border-border text-sm rounded-full py-3 pl-4 pr-12 focus:outline-none focus:ring-1 focus:ring-blue-500 placeholder-mutedForeground">
            <button id="sendTextBtn" class="absolute right-1 top-1 bottom-1 w-10 bg-secondary hover:bg-blue-600 hover:text-white rounded-full flex items-center justify-center transition-colors text-mutedForeground">
                <i data-lucide="arrow-up" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="view-draft" class="view-section p-4">
        <header class="flex items-center mb-4 gap-3">
            <button onclick="navigate('view-main')" class="p-1.5 rounded-md hover:bg-secondary transition-colors text-mutedForeground">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h1 class="text-sm font-semibold text-primary">Πρόχειρο Απάντησης</h1>
        </header>

        <div class="flex-grow flex flex-col gap-3">
            <textarea id="draftTextarea" class="w-full flex-grow bg-card border border-border rounded-xl p-4 text-sm text-primary focus:outline-none focus:ring-1 focus:ring-blue-500 resize-none min-h-[250px] shadow-sm leading-relaxed"></textarea>
            
            <div class="relative">
                <input type="text" id="tweakPrompt" placeholder="Τροποποίηση (π.χ. Κάντο πιο σύντομο)" class="w-full bg-card border border-border text-sm rounded-xl py-3 pl-4 pr-12 focus:outline-none focus:ring-1 focus:ring-blue-500">
                <button id="tweakBtn" class="absolute right-2 top-2 bottom-2 bg-secondary hover:bg-blue-600 rounded-lg px-2 flex items-center justify-center transition-colors text-primary">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-2 mt-2">
                <button id="cancelDraftBtn" onclick="navigate('view-main')" class="bg-card hover:bg-secondary border border-border text-primary py-2.5 rounded-lg text-sm font-medium transition-colors">
                    Ακύρωση
                </button>
                <button id="insertOutlookBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2 shadow-md">
                    <i data-lucide="send" class="w-4 h-4"></i> Επικόλληση
                </button>
            </div>
        </div>
    </div>

    <div id="view-settings" class="view-section p-4">
        <header class="flex items-center mb-6 gap-3">
            <button onclick="navigate('view-main')" class="p-1.5 rounded-md hover:bg-secondary transition-colors text-mutedForeground">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h1 class="text-sm font-semibold text-primary">Ρυθμίσεις</h1>
        </header>

        <div class="space-y-5">
            <div class="space-y-1.5">
                <label class="text-xs font-medium text-mutedForeground">Gemini API Key</label>
                <input type="password" id="setApiKey" class="w-full bg-card border border-border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-medium text-mutedForeground">Μοντέλο AI</label>
                <select id="setModel" class="w-full bg-card border border-border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 appearance-none">
                    <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite (Γρήγορο)</option>
                    <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash (Ισορροπημένο)</option>
                    <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro (Πιο Έξυπνο)</option>
                </select>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-medium text-mutedForeground">Προεπιλεγμένος Τόνος</label>
                <select id="setTone" class="w-full bg-card border border-border rounded-lg p-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 appearance-none">
                    <option value="Επαγγελματικός, ευγενικός και σοβαρός.">Επαγγελματικός (Σοβαρός)</option>
                    <option value="Φιλικός, θερμός και επαγγελματικός.">Φιλικός (Θερμός)</option>
                    <option value="Αυστηρός, λακωνικός και ξεκάθαρος.">Αυστηρός (Λακωνικός)</option>
                    <option value="Άμεσος, σύντομος και περιεκτικός χωρίς πολλά λόγια.">Άμεσος (Σύντομος)</option>
                </select>
            </div>
            <div class="flex items-center justify-between bg-card border border-border p-3 rounded-lg">
                <label class="text-sm font-medium text-primary">Αυτόματη Σύνοψη</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="setAutoSum" class="sr-only peer">
                    <div class="w-9 h-5 bg-muted rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                </label>
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-medium text-mutedForeground">Πρόσθετες Οδηγίες (Custom Prompt)</label>
                <textarea id="setCustomPrompt" placeholder="π.χ. Υπόγραφε πάντα ως 'Η ομάδα της εταιρείας'." class="w-full bg-card border border-border rounded-lg p-2.5 text-sm h-24 resize-none focus:outline-none focus:ring-1 focus:ring-blue-500"></textarea>
            </div>
            <button onclick="saveSettings()" class="w-full bg-primary text-primaryForeground py-2.5 rounded-lg text-sm font-medium hover:bg-gray-200 transition-colors mt-2">
                Αποθήκευση Ρυθμίσεων
            </button>
        </div>
    </div>

    <div id="view-answer" class="view-section p-4">
        <header class="flex items-center mb-4 gap-3">
            <button onclick="navigate('view-main')" class="p-1.5 rounded-md hover:bg-secondary transition-colors text-mutedForeground">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h1 class="text-sm font-semibold text-primary">Απάντηση</h1>
        </header>

        <div class="flex-grow flex flex-col gap-3">
            <div class="bg-card border border-border rounded-xl p-5 shadow-sm min-h-[150px]">
                <p id="answerText" class="text-sm text-primary leading-relaxed whitespace-pre-wrap"></p>
            </div>
            
            <button onclick="navigate('view-main')" class="mt-4 bg-secondary hover:bg-border border border-border text-primary py-2.5 rounded-lg text-sm font-medium transition-colors">
                Νέα Ερώτηση
            </button>
        </div>
    </div>

    <!-- Δυναμική φόρτωση του app.js χωρίς caching -->
    <script>
        (function() {
            var script = document.createElement('script');
            script.src = 'app.js?t=' + new Date().getTime();
            document.head.appendChild(script);
        })();
    </script>
</body>
</html>
